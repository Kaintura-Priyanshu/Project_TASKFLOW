<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TaskFlow — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root { --bg:#0a0a0f; --card:#12121a; --border:#1e1e2e; --accent:#6ee7b7; --text:#f0f0f5; --muted:#6b6b80; --error:#f87171; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .bg-shapes { position:fixed; inset:0; pointer-events:none; overflow:hidden; }
  .shape { position:absolute; border-radius:50%; filter:blur(100px); }
  .s1 { width:400px; height:400px; background:rgba(110,231,183,0.06); top:-100px; right:-100px; }
  .s2 { width:300px; height:300px; background:rgba(244,114,182,0.05); bottom:-100px; left:-100px; }
  .container { width:100%; max-width:420px; padding:2rem; animation:fadeUp 0.6s ease both; }
  .logo { font-family:'Syne',sans-serif; font-size:1.8rem; font-weight:800; color:var(--accent); text-align:center; margin-bottom:0.5rem; }
  .subtitle { text-align:center; color:var(--muted); font-size:0.9rem; margin-bottom:2.5rem; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:2.5rem; }
  .card h2 { font-family:'Syne',sans-serif; font-size:1.5rem; font-weight:700; margin-bottom:0.3rem; }
  .card p { color:var(--muted); font-size:0.9rem; margin-bottom:2rem; }
  .form-group { margin-bottom:1.2rem; }
  label { display:block; font-size:0.85rem; color:var(--muted); margin-bottom:0.4rem; }
  input { width:100%; background:#0a0a0f; border:1px solid var(--border); color:var(--text); padding:0.8rem 1rem; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:0.95rem; transition:border 0.3s; outline:none; }
  input:focus { border-color:var(--accent); }
  input::placeholder { color:var(--muted); }
  .btn { width:100%; padding:0.9rem; background:var(--accent); color:#0a0a0f; border:none; border-radius:10px; font-family:'Syne',sans-serif; font-weight:700; font-size:1rem; cursor:pointer; transition:all 0.3s; margin-top:0.5rem; }
  .btn:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(110,231,183,0.3); }
  .divider { text-align:center; color:var(--muted); font-size:0.85rem; margin:1.5rem 0; position:relative; }
  .divider::before, .divider::after { content:''; position:absolute; top:50%; width:42%; height:1px; background:var(--border); }
  .divider::before { left:0; }
  .divider::after { right:0; }
  .link { text-align:center; font-size:0.9rem; color:var(--muted); margin-top:1.5rem; }
  .link a { color:var(--accent); text-decoration:none; font-weight:500; }
  .error-msg { background:rgba(248,113,113,0.1); border:1px solid rgba(248,113,113,0.3); color:var(--error); padding:0.7rem 1rem; border-radius:8px; font-size:0.85rem; margin-bottom:1rem; display:none; }
  .success-msg { background:rgba(110,231,183,0.1); border:1px solid rgba(110,231,183,0.3); color:var(--accent); padding:0.7rem 1rem; border-radius:8px; font-size:0.85rem; margin-bottom:1rem; display:none; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div class="bg-shapes"><div class="shape s1"></div><div class="shape s2"></div></div>

<div class="container">
  <div class="logo">✅ TaskFlow</div>
  <p class="subtitle">Welcome back! Sign in to continue.</p>
  <div class="card">
    <h2>Sign In</h2>
    <p>Enter your credentials to access your tasks</p>
    <div class="error-msg" id="errorMsg">Invalid email or password.</div>
    <div class="success-msg" id="successMsg">Login successful! Redirecting...</div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••"/>
    </div>
    <button class="btn" onclick="handleLogin()">Sign In →</button>
    <div class="link" style="margin-top:1rem;text-align:right;"><a href="#">Forgot password?</a></div>
  </div>
  <div class="link">Don't have an account? <a href="register.html">Create one free</a></div>
</div>

<script>
function handleLogin() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const errorMsg = document.getElementById('errorMsg');
  const successMsg = document.getElementById('successMsg');
  errorMsg.style.display = 'none';
  successMsg.style.display = 'none';

  if (!email || !password) {
    errorMsg.textContent = 'Please fill in all fields.';
    errorMsg.style.display = 'block';
    return;
  }

  // Check registered users
  const users = JSON.parse(localStorage.getItem('taskflow_users') || '[]');
  const user = users.find(u => u.email === email && u.password === password);

  // Demo login
  if (email === 'demo@taskflow.com' && password === 'demo123') {
    successMsg.style.display = 'block';
    localStorage.setItem('taskflow_user', JSON.stringify({name:'Demo User', email}));
    setTimeout(() => window.location.href = 'dashboard.html', 1000);
    return;
  }

  if (user) {
    successMsg.style.display = 'block';
    localStorage.setItem('taskflow_user', JSON.stringify(user));
    setTimeout(() => window.location.href = 'dashboard.html', 1000);
  } else {
    errorMsg.textContent = 'Invalid email or password. Try demo@taskflow.com / demo123';
    errorMsg.style.display = 'block';
  }
}
document.addEventListener('keydown', e => { if(e.key==='Enter') handleLogin(); });
</script>
</body>
</html>
